name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - '*'

concurrency:
  # Skip intermediate builds: all builds except for builds on the `master` branch
  # Cancel intermediate builds: only pull request builds
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref != 'refs/heads/master' || github.run_number }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  finalize:
    needs: [format, test]
    timeout-minutes: 5
    runs-on: ubuntu-latest
    if: always()

    steps:
      - run: |
          echo format: ${{ needs.format.result }}
          echo test: ${{ needs.test.result }}

      - run: exit 1
        if: |
          (needs.format.result != 'success') ||
          (needs.test.result != 'success')

  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3.0.2
      - uses: taiki-e/install-action@6ed6112eb9893c58dd600eebccdf6e77ab7bfa9c # v2.79.12
        with:
          tool: just
      - name: Install runic
        run: |
          julia --project=@runic --startup-file=no -e 'using Pkg; Pkg.add("Runic")'
          cat > runic <<'SCRIPT'
          #!/bin/sh
          export JULIA_LOAD_PATH="@runic"
          exec julia --startup-file=no -e 'using Runic; exit(Runic.main(ARGS))' -- "$@"
          SCRIPT
          chmod +x runic
          echo "$PWD" >> "$GITHUB_PATH"
      - run: just fmt-check

  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        version:
          - 'min'
          - '1'
          - 'nightly'
        os:
          - ubuntu-latest
          - windows-latest
          - macOS-latest
        arch:
          - x64
        exclude:
          - version: 'min'
            os: windows-latest
          - os: macOS-latest
            arch: x64
        include:
          - version: 'min'
            os: macOS-latest
            arch: x64
            force_arch: true
          - version: '1'
            os: macOS-latest
            arch: aarch64
          - version: 'nightly'
            os: macOS-latest
            arch: aarch64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3.0.2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
          include-all-prereleases: true
          force-arch: ${{ matrix.force_arch || false }}
      - uses: pandoc/actions/setup@86321b6dd4675f5014c611e05088e10d4939e09e # v1.1.1
      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3.1.0
      - uses: julia-actions/julia-buildpkg@e3eb439fad4f9aba7da2667e7510e4a46ebc46e1 # v1.7.0
      - uses: julia-actions/julia-runtest@d60b785c6f2bdf4ebfb18b2b6f7d93b7dfb0efe3 # v1.11.4
        continue-on-error: ${{ matrix.version == 'nightly' }}
